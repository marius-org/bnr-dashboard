name: Build and Deploy BNR Dashboard

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: control-node

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            mariuseu/bnr-dashboard:latest
            mariuseu/bnr-dashboard:${{ github.run_number }}

      - name: Deploy to k3s
        run: |
          kubectl set image deployment/bnr-dashboard \
            bnr-dashboard=mariuseu/bnr-dashboard:${{ github.run_number }}
          kubectl rollout status deployment/bnr-dashboard --timeout=120s
